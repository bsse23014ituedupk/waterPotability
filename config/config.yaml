data:
  filepath: "data/water_potability.csv"
  target_column: "Potability"
  test_size: 0.15
  val_size: 0.15
  random_state: 42

preprocessing:
  imputation_strategy: "median"
  scaler: "robust"

training:
  optuna_trials: 100
  early_stopping_rounds: 15
  random_state: 42

mlflow:
  tracking_uri: "mlruns"
  experiment_name: "water_potability"

api:
  host: "0.0.0.0"
  port: 8000
  artifacts_dir: "artifacts/models"
